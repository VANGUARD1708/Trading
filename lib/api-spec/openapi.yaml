openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Market Context Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: instruments
    description: Watched instruments
  - name: analysis
    description: Pattern, liquidity, and forecast analysis
  - name: narrative
    description: AI-generated market narratives
  - name: setups
    description: Trade setup recommendations
  - name: dashboard
    description: Dashboard aggregates and activity
  - name: anthropic
    description: Anthropic AI chat operations
  - name: scenarios
    description: What-if scenario simulations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /instruments:
    get:
      operationId: listInstruments
      tags: [instruments]
      summary: List all watched instruments
      responses:
        "200":
          description: List of instruments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instrument"
    post:
      operationId: addInstrument
      tags: [instruments]
      summary: Add an instrument to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstrumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instrument"

  /instruments/{symbol}:
    get:
      operationId: getInstrument
      tags: [instruments]
      summary: Get a single instrument
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Instrument
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instrument"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeInstrument
      tags: [instruments]
      summary: Remove an instrument from watchlist
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /instruments/{symbol}/candles/{timeframe}:
    get:
      operationId: getCandles
      tags: [analysis]
      summary: Get OHLCV candle data for an instrument
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candle data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /instruments/{symbol}/patterns/{timeframe}:
    get:
      operationId: getPatterns
      tags: [analysis]
      summary: Get recognized chart patterns for an instrument
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recognized patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pattern"

  /instruments/{symbol}/liquidity-zones/{timeframe}:
    get:
      operationId: getLiquidityZones
      tags: [analysis]
      summary: Get liquidity zones and key price levels
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Liquidity zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiquidityZone"

  /instruments/{symbol}/forecast/{timeframe}:
    get:
      operationId: getForecast
      tags: [analysis]
      summary: Get probabilistic price forecast
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Forecast"

  /instruments/{symbol}/narrative/{timeframe}:
    get:
      operationId: getNarrative
      tags: [narrative]
      summary: Get AI-generated market narrative
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market narrative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketNarrative"

  /instruments/{symbol}/narrative:
    post:
      operationId: generateNarrative
      tags: [narrative]
      summary: Trigger a fresh AI narrative generation
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativeRequest"
      responses:
        "200":
          description: Fresh narrative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketNarrative"

  /instruments/{symbol}/setups/{timeframe}:
    get:
      operationId: getTradeSetups
      tags: [setups]
      summary: Get recommended trade setups
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trade setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSetup"

  /instruments/{symbol}/analyze:
    post:
      operationId: runAnalysis
      tags: [analysis]
      summary: Trigger a fresh full analysis for an instrument
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Analysis triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get aggregated summary across all watched instruments
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent signals, patterns, and events across all instruments
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /dashboard/top-setups:
    get:
      operationId: getTopSetups
      tags: [dashboard]
      summary: Get highest-confidence trade setups across all instruments
      responses:
        "200":
          description: Top setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSetup"


  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /scenarios/simulate:
    post:
      operationId: runSimulation
      tags: [scenarios]
      summary: Run a Monte Carlo price path simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
      responses:
        "200":
          description: Simulation result with all paths
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResult"
  /scenarios/{id}:
    get:
      operationId: getSimulation
      tags: [scenarios]
      summary: Get a past simulation result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /scenarios:
    get:
      operationId: listSimulations
      tags: [scenarios]
      summary: List past simulations
      responses:
        "200":
          description: List of past simulations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScenarioSimulation"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Instrument:
      type: object
      required: [id, symbol, name, category, currentPrice, priceChange24h, priceChangePct24h, volume24h, marketSentiment, addedAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [crypto, forex, equities, commodities, indices]
        currentPrice:
          type: number
        priceChange24h:
          type: number
        priceChangePct24h:
          type: number
        volume24h:
          type: number
        marketSentiment:
          type: string
          enum: [strongly_bullish, bullish, neutral, bearish, strongly_bearish]
        addedAt:
          type: string

    InstrumentInput:
      type: object
      required: [symbol, name, category]
      properties:
        symbol:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [crypto, forex, equities, commodities, indices]

    Candle:
      type: object
      required: [timestamp, open, high, low, close, volume]
      properties:
        timestamp:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    Pattern:
      type: object
      required: [id, instrumentId, symbol, patternType, direction, confidence, timeframe, startTime, endTime, description, priceLevel, status]
      properties:
        id:
          type: integer
        instrumentId:
          type: integer
        symbol:
          type: string
        patternType:
          type: string
        direction:
          type: string
          enum: [bullish, bearish, neutral]
        confidence:
          type: number
        timeframe:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        description:
          type: string
        priceLevel:
          type: number
        status:
          type: string
          enum: [forming, confirmed, invalidated]

    LiquidityZone:
      type: object
      required: [id, instrumentId, symbol, zoneType, priceLevel, priceRangeHigh, priceRangeLow, strength, timeframe, description, testedCount, lastTested]
      properties:
        id:
          type: integer
        instrumentId:
          type: integer
        symbol:
          type: string
        zoneType:
          type: string
          enum: [support, resistance, order_block, fair_value_gap, liquidity_pool]
        priceLevel:
          type: number
        priceRangeHigh:
          type: number
        priceRangeLow:
          type: number
        strength:
          type: string
          enum: [weak, moderate, strong, extreme]
        timeframe:
          type: string
        description:
          type: string
        testedCount:
          type: integer
        lastTested:
          type: ["string", "null"]

    Forecast:
      type: object
      required: [id, instrumentId, symbol, timeframe, currentPrice, bullishTarget, bearishTarget, baseTarget, bullishProbability, bearishProbability, neutralProbability, confidence, horizon, keyDrivers, generatedAt]
      properties:
        id:
          type: integer
        instrumentId:
          type: integer
        symbol:
          type: string
        timeframe:
          type: string
        currentPrice:
          type: number
        bullishTarget:
          type: number
        bearishTarget:
          type: number
        baseTarget:
          type: number
        bullishProbability:
          type: number
        bearishProbability:
          type: number
        neutralProbability:
          type: number
        confidence:
          type: number
        horizon:
          type: string
        keyDrivers:
          type: array
          items:
            type: string
        generatedAt:
          type: string

    MarketNarrative:
      type: object
      required: [id, instrumentId, symbol, timeframe, headline, summary, bullishCase, bearishCase, keyLevels, sentiment, riskFactors, generatedAt]
      properties:
        id:
          type: integer
        instrumentId:
          type: integer
        symbol:
          type: string
        timeframe:
          type: string
        headline:
          type: string
        summary:
          type: string
        bullishCase:
          type: string
        bearishCase:
          type: string
        keyLevels:
          type: array
          items:
            type: number
        sentiment:
          type: string
          enum: [strongly_bullish, bullish, neutral, bearish, strongly_bearish]
        riskFactors:
          type: array
          items:
            type: string
        generatedAt:
          type: string

    NarrativeRequest:
      type: object
      required: [timeframe]
      properties:
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d]

    TradeSetup:
      type: object
      required: [id, instrumentId, symbol, direction, setupType, entryPrice, stopLoss, takeProfits, riskReward, confidence, timeframe, rationale, status, createdAt]
      properties:
        id:
          type: integer
        instrumentId:
          type: integer
        symbol:
          type: string
        direction:
          type: string
          enum: [long, short]
        setupType:
          type: string
        entryPrice:
          type: number
        stopLoss:
          type: number
        takeProfits:
          type: array
          items:
            type: number
        riskReward:
          type: number
        confidence:
          type: number
        timeframe:
          type: string
        rationale:
          type: string
        status:
          type: string
          enum: [active, triggered, completed, invalidated]
        createdAt:
          type: string

    AnalysisRequest:
      type: object
      required: [timeframe]
      properties:
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d]

    AnalysisResult:
      type: object
      required: [symbol, status, patternsFound, zonesFound, setupsFound, message]
      properties:
        symbol:
          type: string
        status:
          type: string
        patternsFound:
          type: integer
        zonesFound:
          type: integer
        setupsFound:
          type: integer
        message:
          type: string

    DashboardSummary:
      type: object
      required: [totalInstruments, bullishCount, bearishCount, neutralCount, activeSetupsCount, highConfidencePatterns, topMover, topMoverPct, avgConfidence, lastUpdated]
      properties:
        totalInstruments:
          type: integer
        bullishCount:
          type: integer
        bearishCount:
          type: integer
        neutralCount:
          type: integer
        activeSetupsCount:
          type: integer
        highConfidencePatterns:
          type: integer
        topMover:
          type: string
        topMoverPct:
          type: number
        avgConfidence:
          type: number
        lastUpdated:
          type: string

    ActivityEvent:
      type: object
      required: [id, symbol, eventType, title, description, severity, timestamp]
      properties:
        id:
          type: integer
        symbol:
          type: string
        eventType:
          type: string
          enum: [pattern_detected, setup_triggered, level_tested, narrative_updated, forecast_revised]
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [info, warning, alert]
        timestamp:
          type: string

    AnthropicConversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    AnthropicMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    AnthropicConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    AnthropicMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    AnthropicConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"

    AnthropicError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ScenarioSimulation:
      type: object
      required: [id, symbol, scenarioType, customPrompt, timeframe, numPaths, horizonCandles, createdAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        scenarioType:
          type: string
        customPrompt:
          type: string
        timeframe:
          type: string
        numPaths:
          type: integer
        horizonCandles:
          type: integer
        createdAt:
          type: string

    ScenarioPath:
      type: object
      required: [id, simulationId, pathIndex, label, probability, prices, createdAt]
      properties:
        id:
          type: integer
        simulationId:
          type: integer
        pathIndex:
          type: integer
        label:
          type: string
        probability:
          type: number
        prices:
          type: array
          items:
            type: number
        createdAt:
          type: string

    ScenarioResult:
      type: object
      required: [simulation, paths, summary]
      properties:
        simulation:
          $ref: "#/components/schemas/ScenarioSimulation"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioPath"
        summary:
          $ref: "#/components/schemas/ScenarioSummary"

    ScenarioSummary:
      type: object
      required: [bullishProbability, bearishProbability, neutralProbability, expectedReturn, maxUpside, maxDownside, confidenceInterval95High, confidenceInterval95Low]
      properties:
        bullishProbability:
          type: number
        bearishProbability:
          type: number
        neutralProbability:
          type: number
        expectedReturn:
          type: number
        maxUpside:
          type: number
        maxDownside:
          type: number
        confidenceInterval95High:
          type: number
        confidenceInterval95Low:
          type: number

    SimulationRequest:
      type: object
      required: [symbol, scenarioType, timeframe]
      properties:
        symbol:
          type: string
        scenarioType:
          type: string
          enum: [breakout_bull, breakdown_bear, range_bound, fed_rate_hike, market_crash, institutional_accumulation, custom]
        timeframe:
          type: string
          enum: [1h, 4h, 1d]
        numPaths:
          type: integer
          default: 20
        horizonCandles:
          type: integer
          default: 50
        customPrompt:
          type: string
